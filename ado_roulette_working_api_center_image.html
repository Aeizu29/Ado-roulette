<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ado Playlist Roulette</title>
  <style>
    :root {
      --bg: #060711;
      --blue: #19a7ff;
      --blue2: #005eff;
      --pink: #ff2f92;
      --text: #f2f7ff;
      --muted: #a9b4ca;
      --panel: rgba(5, 8, 22, .72);
      --border: rgba(116, 194, 255, .34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(0,0,0,.65), rgba(0,20,60,.65)),
        url("ado-wallpaper.jpg"),
        radial-gradient(circle at 20% 20%, rgba(25,167,255,.25), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(255,47,146,.22), transparent 28%),
        var(--bg);
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
      opacity: .45;
    }

    header {
      padding: 34px 22px 16px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 76px);
      letter-spacing: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(25,167,255,.8), 0 0 45px rgba(255,47,146,.25);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    main {
      width: min(1180px, 94vw);
      margin: 0 auto 40px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 22px;
      align-items: stretch;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 0 35px rgba(0, 94, 255, .18), inset 0 0 35px rgba(255,255,255,.025);
      backdrop-filter: blur(10px);
      padding: 22px;
    }

    .roulette-wrap {
      display: grid;
      place-items: center;
      min-height: 520px;
    }

    .roulette {
      position: relative;
      width: min(310px, 72vw);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg,
          #0a4dff 0 22.5deg,
          #071730 22.5deg 45deg,
          #ff2f92 45deg 67.5deg,
          #0c0f1e 67.5deg 90deg,
          #19a7ff 90deg 112.5deg,
          #071730 112.5deg 135deg,
          #a600ff 135deg 157.5deg,
          #0c0f1e 157.5deg 180deg,
          #0a4dff 180deg 202.5deg,
          #071730 202.5deg 225deg,
          #ff2f92 225deg 247.5deg,
          #0c0f1e 247.5deg 270deg,
          #19a7ff 270deg 292.5deg,
          #071730 292.5deg 315deg,
          #a600ff 315deg 337.5deg,
          #0c0f1e 337.5deg 360deg);
      border: 8px solid rgba(255,255,255,.09);
      box-shadow: 0 0 0 2px rgba(25,167,255,.35), 0 0 45px rgba(25,167,255,.35);
      transition: transform 3.1s cubic-bezier(.12,.78,.12,1);
    }

    .roulette::before {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      background: rgba(1, 5, 16, .88);
      border: 1px solid rgba(255,255,255,.12);
    }

    .roulette::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .wheel-center {
      position: absolute;
      inset: 50%;
      width: 128px;
      height: 128px;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: grid;
      place-items: center;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 24px rgba(25,167,255,.35);
      background: rgba(1, 5, 16, .92);
      border: 2px solid rgba(255,255,255,.14);
    }

    .wheel-center img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 42px solid white;
      filter: drop-shadow(0 0 12px rgba(25,167,255,.8));
      margin-bottom: -18px;
      z-index: 2;
    }

    button {
      border: 0;
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      padding: 16px 28px;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(90deg, var(--blue2), var(--pink));
      box-shadow: 0 0 25px rgba(25,167,255,.35);
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover { transform: translateY(-2px); filter: brightness(1.12); }
    button:disabled { cursor: not-allowed; opacity: .55; transform: none; }

    .status {
      margin-top: 18px;
      min-height: 52px;
      color: var(--muted);
      line-height: 1.45;
      text-align: center;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }

    .player-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .song-name {
      font-size: 20px;
      font-weight: 800;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }

    #playerBox {
      flex: 1;
      min-height: 390px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: #000;
    }

    #player, #player iframe {
      width: 100%;
      height: 100%;
      min-height: 390px;
    }

    .debug {
      margin-top: 14px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .debug code { color: #d9ecff; }

    .fallback-link {
      color: #8bd4ff;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .roulette-wrap, .player-card { min-height: auto; }
    }
  </style>
</head>

      <button id="spinBtn">SPIN</button>
      <div id="status" class="status">Click spin once. The YouTube player will load after your click.</div>
    </section>

    <section class="card player-card">
      <div class="player-top">
        <div>
          <div id="songName" class="song-name">No song selected yet</div>
          <div class="small">Playlist: The Complete Ado list</div>
        </div>
      </div>

      <div id="playerBox">
        <div id="player"></div>
      </div>

      <div id="debug" class="debug">
        Debug: waiting for YouTube API...<br>
        If this stays broken, run this file on <code>localhost</code>, not <code>file://</code>.
      </div>
    </section>
  </main>

  <script>
    const PLAYLIST_ID = "PL-sgowJ2PZIdMPtUu03nTjNyqK9_WawlA";

    // YouTube search result says this playlist is large. Static HTML cannot read playlist length without API key,
    // so we use a safe random range. Change this number if you want a bigger/smaller range.
    const ESTIMATED_PLAYLIST_LENGTH = 220;

    const wheel = document.getElementById("wheel");
    const spinBtn = document.getElementById("spinBtn");
    const statusEl = document.getElementById("status");
    const songName = document.getElementById("songName");
    const debug = document.getElementById("debug");
    const playerBox = document.getElementById("playerBox");

    let player = null;
    let apiReady = false;
    let currentRotation = 0;
    let lastIndex = -1;
    let pendingIndex = null;

    function setDebug(msg) {
      debug.innerHTML = msg;
    }

    function randomIndex() {
      let index = Math.floor(Math.random() * ESTIMATED_PLAYLIST_LENGTH);
      if (index === lastIndex) index = (index + 1) % ESTIMATED_PLAYLIST_LENGTH;
      lastIndex = index;
      return index;
    }

    function makeYouTubeUrl(index) {
      return `https://www.youtube.com/watch?list=${PLAYLIST_ID}&index=${index + 1}`;
    }

    function resetPlayerDiv() {
      if (player && typeof player.destroy === "function") {
        try { player.destroy(); } catch (e) {}
      }
      player = null;
      playerBox.innerHTML = '<div id="player"></div>';
    }

    function createAndPlay(index) {
      resetPlayerDiv();

      const origin = window.location.origin && window.location.origin !== "null"
        ? window.location.origin
        : "http://localhost:8000";

      setDebug(`Debug: loading playlist index <code>${index + 1}</code>...<br>Fallback: <a class="fallback-link" target="_blank" href="${makeYouTubeUrl(index)}">open this song on YouTube</a>`);

      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          enablejsapi: 1,
          origin: origin
        },
        events: {
          onReady: function(event) {
            try {
              event.target.loadPlaylist({
                listType: "playlist",
                list: PLAYLIST_ID,
                index: index,
                startSeconds: 0
              });
              setTimeout(() => {
                try { event.target.playVideo(); } catch (e) {}
              }, 650);
              setDebug(`Debug: loaded index <code>${index + 1}</code>.<br>If YouTube refuses embed, use fallback: <a class="fallback-link" target="_blank" href="${makeYouTubeUrl(index)}">open on YouTube</a>`);
            } catch (err) {
              setDebug(`Debug error: <code>${String(err)}</code><br><a class="fallback-link" target="_blank" href="${makeYouTubeUrl(index)}">Open on YouTube</a>`);
            }
          },
          onError: function(event) {
            const codes = {
              2: "Invalid parameter.",
              5: "HTML5 player error.",
              100: "Video removed or private.",
              101: "The video owner blocks embedding.",
              150: "The video owner blocks embedding.",
              153: "YouTube embed configuration/referrer issue. Use localhost and not file://."
            };
            setDebug(`YouTube error <code>${event.data}</code>: ${codes[event.data] || "Unknown error."}<br><a class="fallback-link" target="_blank" href="${makeYouTubeUrl(index)}">Open the selected song on YouTube</a>`);
          },
          onStateChange: function(event) {
            // 1 = playing, 5 = cued, -1 = unstarted
            if (event.data === 1) {
              setDebug(`Debug: playing playlist index <code>${index + 1}</code>.`);
            }
          }
        }
      });
    }

    function spin() {
      if (!apiReady) {
        statusEl.textContent = "YouTube API is not ready yet. Try again in a second.";
        return;
      }

      spinBtn.disabled = true;
      const index = randomIndex();
      pendingIndex = index;

      currentRotation += 1440 + Math.floor(Math.random() * 720);
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      songName.textContent = `Selected song #${index + 1}`;
      statusEl.textContent = "Spinning...";

      setTimeout(() => {
        statusEl.textContent = `Loading song #${index + 1} from the playlist...`;
        createAndPlay(index);
        spinBtn.disabled = false;
      }, 3100);
    }

    spinBtn.addEventListener("click", spin);

    window.onYouTubeIframeAPIReady = function() {
      apiReady = true;
      setDebug("Debug: YouTube API ready. Click SPIN.");
      statusEl.textContent = "Ready. Click spin.";
    };

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    tag.onerror = function() {
      setDebug("Debug: could not load YouTube API. Check your internet/adblocker.");
    };
    document.head.appendChild(tag);
  </script>
</body>
</html>
